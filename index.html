<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studiamo italiano</title>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #d9e1ee;
      --btn: #e9edf5;
      --btn-hover: #dce4f2;
      --accent: #2f5bd3;
      --accent-soft: #eef3ff;
      --shadow: 0 8px 24px rgba(0,0,0,0.06);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      text-align: center;
      margin: 10px 0 16px;
      font-size: clamp(28px, 4vw, 40px);
    }

    .box {
      background: var(--card);
      padding: 18px;
      margin-top: 14px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    label {
      font-weight: bold;
    }

    select,
    button {
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 12px 14px;
    }

    select {
      background: #fff;
      min-height: 48px;
    }

    button {
      cursor: pointer;
      background: var(--btn);
      border: 1px solid var(--border);
      min-height: 52px;
    }

    button:hover {
      background: var(--btn-hover);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary-button {
      background: var(--accent-soft);
      border-color: #cfd9fb;
    }

    .primary-button:hover {
      background: #dde7ff;
    }

    .full-width {
      width: 100%;
    }

    .grow {
      flex: 1 1 280px;
      min-width: 220px;
    }

    .file-meta {
      color: var(--muted);
      font-style: italic;
      margin-top: 4px;
      word-break: break-word;
    }

    .stats {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .prompt {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: bold;
      text-align: center;
      line-height: 1.25;
      margin-top: 6px;
      word-break: break-word;
    }

    .example {
      font-size: clamp(18px, 3vw, 22px);
      text-align: center;
      margin-top: 16px;
      color: #3c3c3c;
      min-height: 28px;
      white-space: pre-line;
    }

    .answer {
      font-size: clamp(20px, 3.5vw, 28px);
      color: var(--accent);
      text-align: center;
      margin-top: 20px;
      min-height: 34px;
      white-space: pre-line;
      font-weight: bold;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .action-button {
      min-height: 86px;
      font-size: 18px;
      line-height: 1.25;
      white-space: normal;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .box {
        padding: 14px;
      }

      .row {
        flex-direction: column;
        align-items: stretch;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .action-button,
      select,
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1>Studiamo italiano</h1>

  <div class="box">
    <div class="row">
      <div class="grow">
        <label for="jsonSelect">File JSON</label>
        <select id="jsonSelect" class="full-width">
          <option value="">-- Scegli un file JSON --</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="grow">
        <label for="language">Lingua</label>
        <select id="language" class="full-width">
          <option value="Italiano">Italiano</option>
          <option value="Finlandese">Finlandese</option>
        </select>
      </div>

      <div class="grow">
        <label>&nbsp;</label>
        <button id="startButton" class="primary-button full-width" type="button">
          Inizia da capo - Aloita alusta
        </button>
      </div>
    </div>

    <div id="fileName" class="file-meta">Nessun file selezionato</div>
  </div>

  <div class="box">
    <div id="stats" class="stats">Imparate | Tutte: 0 | 0</div>
  </div>

  <div class="box">
    <div id="prompt" class="prompt">Scegli un file JSON e inizia il test.</div>
    <div id="example" class="example"></div>
    <div id="answer" class="answer"></div>
  </div>

  <div class="buttons">
    <button id="showAnswerButton" class="action-button" type="button">
      Mostra la risposta<br>Näytä vastaus
    </button>

    <button id="failButton" class="action-button" type="button">
      Non lo sapevo<br>En osannut
    </button>

    <button id="successButton" class="action-button" type="button">
      Lo sapevo<br>Osasin
    </button>
  </div>

  <script>
    let data = [];
    let test = [];
    let current = null;
    let currentIndex = null;
    let currentFileLabel = "";

    const jsonSelect = document.getElementById("jsonSelect");
    const fileName = document.getElementById("fileName");
    const language = document.getElementById("language");
    const startButton = document.getElementById("startButton");
    const promptEl = document.getElementById("prompt");
    const exampleEl = document.getElementById("example");
    const answerEl = document.getElementById("answer");
    const statsEl = document.getElementById("stats");
    const showAnswerButton = document.getElementById("showAnswerButton");
    const failButton = document.getElementById("failButton");
    const successButton = document.getElementById("successButton");

    function setButtonsEnabled(enabled) {
      startButton.disabled = !enabled;
      showAnswerButton.disabled = !enabled;
      failButton.disabled = !enabled;
      successButton.disabled = !enabled;
    }

    function updateStats() {
      const learned = data.length - test.length;
      statsEl.innerText = "Imparate | Tutte: " + learned + " | " + data.length;
    }

    function clearAnswer() {
      answerEl.innerText = "";
    }

    function clearExample() {
      exampleEl.innerText = "";
    }

    function resetExerciseState() {
      test = [];
      current = null;
      currentIndex = null;
      clearAnswer();
      clearExample();
      updateStats();
    }

    function fileNameWithoutExtension(name) {
      return String(name || "").replace(/\.json$/i, "");
    }

    function normalizePayload(parsed, fallbackFileName = "") {
      if (Array.isArray(parsed)) {
        return {
          title: "",
          source: "",
          items: parsed,
          fileLabel: fileNameWithoutExtension(fallbackFileName)
        };
      }

      if (parsed && typeof parsed === "object" && Array.isArray(parsed.items)) {
        return {
          title: typeof parsed.title === "string" ? parsed.title.trim() : "",
          source: typeof parsed.source === "string" ? parsed.source.trim() : "",
          items: parsed.items,
          fileLabel: fileNameWithoutExtension(fallbackFileName)
        };
      }

      throw new Error("Il file JSON deve contenere una lista oppure { title, source, items }.");
    }

    function validateData(arr) {
      if (!Array.isArray(arr)) {
        throw new Error("Il file JSON deve contenere una lista.");
      }

      for (let i = 0; i < arr.length; i++) {
        const item = arr[i];

        if (typeof item !== "object" || item === null) {
          throw new Error("Elemento non valido alla posizione " + i);
        }

        const required = ["italian", "finnish", "example", "example_translation"];
        for (const key of required) {
          if (!(key in item)) {
            throw new Error("Manca il campo '" + key + "' alla posizione " + i);
          }
        }
      }
    }

    function buildVisibleLabel(filename, title, source) {
      let label = (title && title.trim()) || fileNameWithoutExtension(filename) || "JSON";
      if (source && source.trim()) {
        label += " (" + source.trim() + ")";
      }
      return label;
    }

    function applyLoadedData(normalized, fallbackFileName = "") {
      validateData(normalized.items);

      data = normalized.items;
      resetExerciseState();

      currentFileLabel = buildVisibleLabel(
        fallbackFileName,
        normalized.title,
        normalized.source
      );

      fileName.innerText = currentFileLabel;
      promptEl.innerText = "File caricato. Premi Inizia da capo.";
      clearExample();
      clearAnswer();
      updateStats();
      setButtonsEnabled(true);
    }

    function render() {
      if (test.length === 0) {
        current = null;
        currentIndex = null;
        promptEl.innerText = "Benissimo!";
        exampleEl.innerText = "";
        answerEl.innerText = "";
        updateStats();
        return;
      }

      currentIndex = Math.floor(Math.random() * test.length);
      current = test[currentIndex];

      if (language.value === "Italiano") {
        promptEl.innerText = current.italian;
        exampleEl.innerText = current.example;
      } else {
        promptEl.innerText = current.finnish;
        exampleEl.innerText = current.example_translation;
      }

      clearAnswer();
      updateStats();
    }

    function showAnswer() {
      if (!current) return;

      if (language.value === "Italiano") {
        answerEl.innerText = current.finnish + "\n" + current.example_translation;
      } else {
        answerEl.innerText = current.italian + "\n" + current.example;
      }
    }

    function failItem() {
      if (!current) return;
      render();
    }

    function successItem() {
      if (!current) return;
      test.splice(currentIndex, 1);
      render();
    }

    function start() {
      if (data.length === 0) {
        promptEl.innerText = "Scegli prima un file JSON.";
        exampleEl.innerText = "";
        answerEl.innerText = "";
        return;
      }

      test = [...data];
      current = null;
      currentIndex = null;
      render();
    }

    function refreshCurrentLanguageView() {
      if (!current) return;

      if (language.value === "Italiano") {
        promptEl.innerText = current.italian;
        exampleEl.innerText = current.example;
      } else {
        promptEl.innerText = current.finnish;
        exampleEl.innerText = current.example_translation;
      }

      clearAnswer();
    }

    async function loadJsonFromSite(filename) {
      if (!filename) return;

      promptEl.innerText = "Caricamento del file JSON...";
      clearExample();
      clearAnswer();

      try {
        const response = await fetch(filename, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Load failed");
        }

        const parsed = await response.json();
        const normalized = normalizePayload(parsed, filename);

        applyLoadedData(normalized, filename);
        start();
      } catch (err) {
        data = [];
        resetExerciseState();
        fileName.innerText = "Errore nel caricamento del file JSON.";
        promptEl.innerText = "Errore nel caricamento del file JSON.";
        exampleEl.innerText = "Controlla che il file esista nella stessa cartella di index.html.";
        answerEl.innerText = err.message || "Load failed";
        setButtonsEnabled(false);
      }
    }

    async function loadFileList() {
      try {
        const response = await fetch("files.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Impossibile leggere files.json");
        }

        const files = await response.json();

        if (!Array.isArray(files)) {
          throw new Error("files.json deve contenere una lista di nomi file.");
        }

        jsonSelect.innerHTML = '<option value="">-- Scegli un file JSON --</option>';

        files.forEach((filename) => {
          const option = document.createElement("option");
          option.value = filename;
          option.textContent = fileNameWithoutExtension(filename);
          jsonSelect.appendChild(option);
        });
      } catch (err) {
        jsonSelect.innerHTML = '<option value="">Errore caricamento lista</option>';
        fileName.innerText = "Errore nel caricamento di files.json.";
        promptEl.innerText = "Controlla che files.json esista nella stessa cartella di index.html.";
        exampleEl.innerText = err.message || "";
        answerEl.innerText = "";
        setButtonsEnabled(false);
      }
    }

    jsonSelect.addEventListener("change", function() {
      const filename = this.value;
      if (!filename) return;
      loadJsonFromSite(filename);
    });

    language.addEventListener("change", refreshCurrentLanguageView);
    startButton.addEventListener("click", start);
    showAnswerButton.addEventListener("click", showAnswer);
    failButton.addEventListener("click", failItem);
    successButton.addEventListener("click", successItem);

    loadFileList();
    setButtonsEnabled(false);
    updateStats();
  </script>

</body>
</html>
