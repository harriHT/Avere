<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studiamo italiano</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 950px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f7fb;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .row {
      margin-bottom: 14px;
    }

    .prompt {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
    }

    .example {
      font-size: 18px;
      text-align: center;
      margin-top: 10px;
    }

    .answer {
      font-size: 22px;
      color: blue;
      text-align: center;
      margin-top: 20px;
      white-space: pre-line;
    }

    .buttons {
      margin-top: 20px;
      text-align: center;
    }

    button,
    select,
    .file-button {
      padding: 12px;
      margin: 5px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button,
    .file-button {
      cursor: pointer;
      background: #e9edf5;
    }

    button:hover,
    .file-button:hover {
      background: #dce4f2;
    }

    .action-button {
      width: 220px;
      min-height: 80px;
    }

    #language {
      margin-left: 8px;
    }

    #fileInput {
      display: none;
    }

    .file-name {
      display: inline-block;
      margin-left: 10px;
      font-style: italic;
      color: #444;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <h1>Studiamo italiano</h1>

  <div class="box">
    <div class="row">
      <label for="fileInput" class="file-button">Scegli il file - Valitse tiedosto (json)</label>
      <input type="file" id="fileInput" accept=".json,application/json">
      <span id="fileName" class="file-name">Nessun file selezionato</span>
    </div>

    <div class="row">
      <label for="language">Lingua:</label>
      <select id="language">
        <option value="Italiano">Italiano</option>
        <option value="Finlandese">Finlandese</option>
      </select>
    </div>

    <div class="row">
      <button onclick="start()">Inizia da capo - Aloita alusta</button>
    </div>
  </div>

  <div class="box">
    <div id="stats">Imparate | Tutte: 0 | 0</div>
  </div>

  <div class="box">
    <div class="prompt" id="prompt">Scegli un file JSON e inizia il test.</div>
    <div class="example" id="example"></div>
    <div class="answer" id="answer"></div>
  </div>

  <div class="buttons">
    <button class="action-button" onclick="showAnswer()">
      Mostra la risposta<br>Nayta vastaus
    </button>

    <button class="action-button" onclick="failItem()">
      Non lo sapevo<br>En osannut
    </button>

    <button class="action-button" onclick="successItem()">
      Lo sapevo<br>Osasin
    </button>
  </div>

  <script>
    let data = [];
    let test = [];
    let current = null;
    let currentIndex = null;

    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const language = document.getElementById("language");
    const promptEl = document.getElementById("prompt");
    const exampleEl = document.getElementById("example");
    const answerEl = document.getElementById("answer");
    const statsEl = document.getElementById("stats");

    function updateStats() {
      const learned = data.length - test.length;
      statsEl.innerText = "Imparate | Tutte: " + learned + " | " + data.length;
    }

    function clearAnswer() {
      answerEl.innerText = "";
    }

    function validateData(arr) {
      if (!Array.isArray(arr)) {
        throw new Error("Il file JSON deve contenere una lista.");
      }

      for (let i = 0; i < arr.length; i++) {
        const item = arr[i];

        if (typeof item !== "object" || item === null) {
          throw new Error("Elemento non valido alla posizione " + i);
        }

        const required = ["italian", "finnish", "example", "example_translation"];
        for (const key of required) {
          if (!(key in item)) {
            throw new Error("Manca il campo '" + key + "' alla posizione " + i);
          }
        }
      }
    }

    function render() {
      if (test.length === 0) {
        current = null;
        currentIndex = null;
        promptEl.innerText = "Benissimo!";
        exampleEl.innerText = "";
        answerEl.innerText = "";
        updateStats();
        return;
      }

      currentIndex = Math.floor(Math.random() * test.length);
      current = test[currentIndex];

      if (language.value === "Italiano") {
        promptEl.innerText = current.italian;
        exampleEl.innerText = current.example;
      } else {
        promptEl.innerText = current.finnish;
        exampleEl.innerText = current.example_translation;
      }

      clearAnswer();
      updateStats();
    }

    function showAnswer() {
      if (!current) return;

      if (language.value === "Italiano") {
        answerEl.innerText = current.finnish + "\n" + current.example_translation;
      } else {
        answerEl.innerText = current.italian + "\n" + current.example;
      }
    }

    function failItem() {
      if (!current) return;
      render();
    }

    function successItem() {
      if (!current) return;
      test.splice(currentIndex, 1);
      render();
    }

    function start() {
      if (data.length === 0) {
        promptEl.innerText = "Scegli prima un file JSON.";
        exampleEl.innerText = "";
        answerEl.innerText = "";
        return;
      }

      test = [...data];
      current = null;
      currentIndex = null;
      render();
    }

    function refreshCurrentLanguageView() {
      if (!current) return;

      if (language.value === "Italiano") {
        promptEl.innerText = current.italian;
        exampleEl.innerText = current.example;
      } else {
        promptEl.innerText = current.finnish;
        exampleEl.innerText = current.example_translation;
      }

      clearAnswer();
    }

    fileInput.addEventListener("change", function(event) {
      const file = event.target.files[0];

      if (!file) {
        return;
      }

      fileName.innerText = file.name;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          validateData(parsed);

          data = parsed;
          test = [];
          current = null;
          currentIndex = null;

          promptEl.innerText = "File caricato. Premi Inizia da capo.";
          exampleEl.innerText = "";
          answerEl.innerText = "";
          updateStats();
        } catch (err) {
          data = [];
          test = [];
          current = null;
          currentIndex = null;
          promptEl.innerText = "Errore nel file JSON.";
          exampleEl.innerText = err.message;
          answerEl.innerText = "";
          updateStats();
        }
      };

      reader.readAsText(file, "utf-8");
    });

    language.addEventListener("change", refreshCurrentLanguageView);

    updateStats();
  </script>

</body>
</html>
